<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tolk Releases</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0d0d0d; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { max-width: 480px; width: 90%; padding: 48px 40px; text-align: center; }
  h1 { font-size: 28px; font-weight: 600; margin-bottom: 8px; color: #fff; }
  .tagline { font-size: 15px; color: #888; margin-bottom: 32px; }
  .download { display: inline-block; padding: 12px 32px; background: #fff; color: #0d0d0d; font-size: 15px; font-weight: 600; border-radius: 8px; text-decoration: none; transition: opacity 0.15s; }
  .download:hover { opacity: 0.85; }
  .meta { margin-top: 24px; font-size: 13px; color: #555; }
  .meta a { color: #888; text-decoration: none; }
  .meta a:hover { text-decoration: underline; }
  .version { display: inline-block; margin-top: 16px; font-size: 12px; color: #444; font-family: 'SF Mono', monospace; }
</style>
</head>
<body>
<div class="card">
  <h1>tolk</h1>
  <p class="tagline">press. speak. done.</p>
  <a class="download" id="dl" href="https://github.com/uid4oe/tolk-releases/releases/latest">Download for macOS</a>
  <div class="meta">
    <a href="https://github.com/uid4oe/tolk-releases/releases">All releases</a>
  </div>
  <span class="version" id="ver"></span>
</div>
<script>
fetch('appcast.xml').then(r=>r.text()).then(xml=>{
  const d=new DOMParser().parseFromString(xml,'text/xml');
  const v=d.querySelector('shortVersionString');
  const u=d.querySelector('enclosure');
  if(v)document.getElementById('ver').textContent='v'+v.textContent;
  if(u)document.getElementById('dl').href=u.getAttribute('url');
});
</script>
</body>
</html>
